            </div>
            <div style={css.status}>
              <span style={{color:"#6e7681"}}>Last AI fetch: <strong style={{color:"#e6edf3"}}>{lastFetch}</strong></span>
              <span style={{color:"#6e7681"}}>Auto in: <strong style={{color:"#f97316"}}>{countdown}m</strong></span>
              <button style={css.btn()} onClick={fetchAIPrices} disabled={aiStatus==="loading"}>
                {aiStatus==="loading"?"⏳ Fetching…":"🔄 Refresh Now"}
              </button>
              <button style={css.btn("#374151")} onClick={resetData}>↺ Reset</button>
            </div>
          </div>

          <div style={css.main}>
            {/* ── Banners ── */}
            <div style={css.banner}>
              <strong>🚨 National Energy Emergency Active (March 24, 2026)</strong> — Strait of Hormuz closure caused PH fuel prices to spike sharply. US-Iran ceasefire April 8. Rollback projected week of April 13–18. Monitor <strong>doe.gov.ph</strong>.
            </div>
            <div style={css.bufBan}>
              <strong>ℹ️ +₱{BUFFER}/L fuel buffer · +₱{LPG_BUFFER} per 11 kg LPG</strong> — DOE publishes national reference prices. Tacloban pump prices are typically ₱5–₱15 higher due to inter-island freight and local margins. <strong style={{color:"#fff"}}>Green = estimated pump price.</strong> Use ✏️ Report to submit actual prices you see at the pump.
            </div>

            {/* ── Summary Cards ── */}
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:8,marginBottom:12}}>
              {[
                {label:"Avg Diesel (est.)",  val:`₱${(parseFloat(avgD)+BUFFER).toFixed(2)}/L`, sub:`DOE ref ₱${avgD}`,        col:"#60a5fa"},
                {label:"Avg RON 91 (est.)",  val:`₱${(parseFloat(avgG)+BUFFER).toFixed(2)}/L`, sub:`DOE ref ₱${avgG}`,        col:"#f97316"},
                {label:"Cheapest Diesel",     val:`₱${(parseFloat(minD)+BUFFER).toFixed(2)}/L`, sub:`DOE ref ₱${minD}`,        col:"#22c55e"},
                {label:"Cheapest RON 91",     val:`₱${(parseFloat(minG)+BUFFER).toFixed(2)}/L`, sub:`DOE ref ₱${minG}`,        col:"#4ade80"},
                {label:"Stations Tracked",    val:stations.length,                               sub:`${lpgList.length} dealers`,col:"#a78bfa"},
                {label:"Community Reports",   val:commEdits,                                     sub:"Saved locally",           col:"#34d399"},
              ].map((c,i)=>(
                <div key={i} style={{background:"#161b22",border:`1px solid ${c.col}33`,borderRadius:10,padding:"10px 12px"}}>
                  <div style={{fontSize:10,color:"#8b949e",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:4}}>{c.label}</div>
                  <div style={{fontSize:18,fontWeight:800,color:c.col}}>{c.val}</div>
                  <div style={{fontSize:10,color:"#6e7681",marginTop:2}}>{c.sub}</div>
                </div>
              ))}
            </div>

            {/* ── Toolbar ── */}
            <div style={css.bar}>
              <input style={{...css.input,width:200}} placeholder="🔍 Search station, area…" value={search} onChange={e=>setSearch(e.target.value)} />
              {tab==="stations"&&<select style={css.sel} value={filterBrand} onChange={e=>setFilterBrand(e.target.value)}>{brands.map(b=><option key={b}>{b}</option>)}</select>}
              <div style={{display:"flex",gap:4}}>
                {["stations","lpg","log"].map(t=>(
                  <button key={t} style={css.tab(tab===t)} onClick={()=>setTab(t)}>
                    {t==="stations"?`⛽ Stations (${stations.length})`:t==="lpg"?`🔥 LPG (${lpgList.length})`:`📋 Log (${edits.length})`}
                  </button>
                ))}
              </div>
            </div>

            {/* ── Tables ── */}
            <div style={{overflowX:"auto"}}>
              {tab==="stations"&&(
                <div style={css.card}>
                  <table style={css.tbl}>
                    <thead><tr>
                      <th style={css.th}>Brand / Station</th><th style={css.th}>Area</th>
                      <th style={css.th}>Diesel DOE</th><th style={{...css.th,color:"#93c5fd"}}>+₱{BUFFER} Est.</th>
                      <th style={css.th}>RON 91 DOE</th><th style={{...css.th,color:"#fdba74"}}>+₱{BUFFER} Est.</th>
                      <th style={{...css.th,color:"#fb923c"}}>RON 95 Est.</th>
                      <th style={{...css.th,color:"#c084fc"}}>Kero Est.</th>
                      <th style={css.th}>Source</th><th style={css.th}>Report</th>
                    </tr></thead>
                    <tbody>
                      {fS.map(s=>(
                        <tr key={s.id} style={{background:s.communityEdit?"#1a2010":"transparent"}}>
                          <td style={css.td}>
                            <div style={{display:"flex",alignItems:"center",gap:6}}>
                              <div style={{width:8,height:8,borderRadius:"50%",background:brandColor(s.brand),flexShrink:0}}/>
                              <div><div style={{fontWeight:600,color:"#e6edf3"}}>{s.name}</div><div style={{fontSize:10,color:"#6e7681"}}>{s.address}</div></div>
                            </div>
                          </td>
                          <td style={css.td}><span style={css.badge(brandColor(s.brand))}>{s.area}</span></td>
                          <td style={{...css.td,color:"#60a5fa"}}>{fmt(s.diesel)}</td>
                          <td style={{...css.td,color:"#93c5fd",fontWeight:700}}>{fmtBuf(s.diesel)}</td>
                          <td style={{...css.td,color:"#f97316"}}>{fmt(s.gas91)}</td>
                          <td style={{...css.td,color:"#fdba74",fontWeight:700}}>{fmtBuf(s.gas91)}</td>
                          <td style={{...css.td,color:"#fb923c",fontWeight:700}}>{fmtBuf(s.gas95)}</td>
                          <td style={{...css.td,color:"#c084fc",fontWeight:700}}>{fmtBuf(s.kero)}</td>
                          <td style={css.td}><span style={{...css.badge(s.communityEdit?"#22c55e":"#8b949e"),fontSize:9}}>{s.communityEdit?"👥 Community":s.source}</span></td>
                          <td style={css.td}><button style={{...css.btn("#1d4ed8"),padding:"3px 8px",fontSize:11}} onClick={()=>setEditModal({type:"station",item:s})}>✏️</button></td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              )}
              {tab==="lpg"&&(
                <div style={css.card}>
                  <table style={css.tbl}>
                    <thead><tr>
                      <th style={css.th}>Brand</th><th style={css.th}>Dealer</th><th style={css.th}>Address</th>
                      <th style={css.th}>Contact</th><th style={css.th}>DOE Ref 11kg</th>
                      <th style={{...css.th,color:"#86efac"}}>Est. +₱{LPG_BUFFER}</th>
                      <th style={css.th}>Source</th><th style={css.th}>Report</th>
                    </tr></thead>
                    <tbody>
                      {fL.map(l=>(
                        <tr key={l.id} style={{background:l.communityEdit?"#1a2010":"transparent"}}>
                          <td style={css.td}><div style={{display:"flex",alignItems:"center",gap:6}}><div style={{width:8,height:8,borderRadius:"50%",background:brandColor(l.brand),flexShrink:0}}/><strong style={{color:brandColor(l.brand)}}>{l.brand}</strong></div></td>
                          <td style={{...css.td,fontWeight:600}}>{l.dealer}</td>
                          <td style={{...css.td,color:"#8b949e",fontSize:11}}>{l.address}</td>
                          <td style={{...css.td,color:"#6e7681",fontSize:11}}>{l.phone||"—"}</td>
                          <td style={{...css.td,color:"#4ade80"}}>₱{l.price11kg.toLocaleString()}</td>
                          <td style={{...css.td,color:"#86efac",fontWeight:700}}>₱{(l.price11kg+LPG_BUFFER).toLocaleString()}</td>
                          <td style={css.td}><span style={{...css.badge(l.communityEdit?"#22c55e":"#8b949e"),fontSize:9}}>{l.communityEdit?"👥 Community":l.source}</span></td>
                          <td style={css.td}><button style={{...css.btn("#1d4ed8"),padding:"3px 8px",fontSize:11}} onClick={()=>setEditModal({type:"lpg",item:l})}>✏️</button></td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              )}
              {tab==="log"&&(
                <div style={css.card}>
                  {edits.length===0&&<div style={{padding:20,color:"#6e7681",textAlign:"center"}}>No reports yet. Be the first to report a real pump price!</div>}
                  {edits.map((e,i)=>(
                    <div key={i} style={{padding:"10px 14px",borderBottom:"1px solid #1a1f27",display:"flex",gap:10,alignItems:"flex-start"}}>
                      <div style={{fontSize:16,flexShrink:0}}>{e.type==="ai-auto"?"🤖":"👥"}</div>
                      <div><div style={{fontSize:12,color:"#c9d1d9"}}>{e.msg}</div><div style={{fontSize:10,color:"#6e7681",marginTop:3}}>{e.ts} · {e.source}</div></div>
                      <span style={{...css.badge(e.type==="ai-auto"?"#3b82f6":"#22c55e"),marginLeft:"auto",flexShrink:0,alignSelf:"center"}}>{e.type==="ai-auto"?"🤖 AI":"👥 Community"}</span>
                    </div>
                  ))}
                </div>
              )}
            </div>

            {/* ── Footer ── */}
            <div style={{background:"#1c1a16",border:"1px solid #4a3600",borderRadius:8,padding:"10px 12px",marginTop:12,fontSize:11,color:"#a16207",lineHeight:1.65}}>
              <strong style={{color:"#f59e0b"}}>⚠️ Accuracy Notice:</strong> DOE reference prices effective April 7–11, 2026. Buffer is a conservative freight-and-margin estimate, not a price cap. Community reports are stored in your browser and not independently verified. "Est." prices are extrapolated from national DOE bulletins. Always verify at the pump. Report price gouging: <strong>1-800-10-DOE-2673</strong> · <strong>doe.gov.ph</strong>
            </div>
            <div style={{textAlign:"center",padding:"12px 0",fontSize:10,color:"#30363d"}}>
              Tacloban Oil Watch · localStorage + Cloudflare Worker AI · No tracking
            </div>
          </div>

          {editModal&&<EditModal editModal={editModal} setEditModal={setEditModal} submitEdit={submitEdit} stations={stations} lpgList={lpgList} css={css}/>}
        </div>
      );
    }

    function EditModal({editModal,setEditModal,submitEdit,stations,lpgList,css}) {
      const [val,setVal]=useState(""); const [field,setField]=useState("diesel"); const [note,setNote]=useState("");
      const {type,item}=editModal; const isStation=type==="station";
      return (
        <div style={css.modal} onClick={()=>setEditModal(null)}>
          <div style={css.mbox} onClick={e=>e.stopPropagation()}>
            <div style={css.mh}>✏️ Community Price Report</div>
            <div style={{fontSize:12,color:"#c9d1d9",marginBottom:12}}>
              <strong style={{color:"#f97316"}}>{item.name||item.dealer}</strong><br/>
              <span style={{color:"#6e7681"}}>{item.address}</span>
            </div>
            {isStation&&<><label style={css.mlbl}>Fuel Type</label><select style={css.minp} value={field} onChange={e=>setField(e.target.value)}><option value="diesel">Diesel</option><option value="gas91">RON 91</option><option value="gas95">RON 95</option><option value="kero">Kerosene</option></select></>}
            <label style={css.mlbl}>{isStation?"Actual Pump Price (₱/L)":"Actual Price per 11 kg cylinder (₱)"}</label>
            <input style={css.minp} type="number" min="0" step="0.01" placeholder={isStation?"e.g. 172.50":"e.g. 1800"} value={val} onChange={e=>setVal(e.target.value)}/>
            <label style={css.mlbl}>Note (optional)</label>
            <input style={css.minp} type="text" placeholder='e.g. "saw this at 2pm today"' value={note} onChange={e=>setNote(e.target.value)}/>
            <div style={{fontSize:10,color:"#6e7681",marginBottom:10}}>Reports are stored locally and flagged 👥 Community for transparency.</div>
            <div style={css.mrow}>
              <button style={css.btn("#22c55e")} onClick={()=>submitEdit(type,item.id,field,val,note)}>✅ Submit</button>
              <button style={css.btn("#6e7681")} onClick={()=>setEditModal(null)}>Cancel</button>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
